<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula06 - atividade</title>
</head>
<body>
    
    <style>

        .grid{
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
        }
        
        .item1{
            background-color: rgb(160, 7, 7);
            color: white;
            padding: 100px;
            text-align: center;
            border-radius: 20px;
        }
        .item2{
            background-color: rgb(51, 145, 63);
            color: white;
            padding: 100px;
            text-align: center;
            border-radius: 20px;
        }
         .item3{
            background-color: rgb(5, 13, 102);
            color: white;
            padding: 100px;
            text-align: center;
            border-radius: 20px;
        }
         .item4{
            background-color: rgb(97, 4, 129);
            color: white;
            padding: 100px;
            text-align: center;
            border-radius: 20px;
        }
         .item5{
            background-color: rgb(18, 195, 192);
            color: white;
            padding: 100px;
            text-align: center;
            border-radius: 20px;
        }
         .item6{
            background-color: rgb(255, 41, 209);
            color: white;
            padding: 100px;
            text-align: center;
            border-radius: 20px;
        }

  </style>

    <title>Aula05 - GRID CSS responsivot</title>
</head>
<body>
      <div class="grid">
      <div class="item1">Item1</div>
      <div class="item2">Item2</div>
      <div class="item3">Item3</div>
      <div class="item4">Item4</div>
      <div class="item5">Item5</div>
      <div class="item6">Item6</div>
    
</body>
</html>
